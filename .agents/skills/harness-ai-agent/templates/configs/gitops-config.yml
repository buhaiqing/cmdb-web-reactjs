# GitOps 配置模板
# ArgoCD Application 定义

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-staging
  namespace: argocd
  annotations:
    harness.io/service: myapp
    harness.io/environment: staging
    harness.io/managed-by: harness-ai-agent
spec:
  project: default
  source:
    repoURL: https://github.com/myorg/gitops-config
    targetRevision: HEAD
    path: environments/staging/myapp
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: backend.image.tag
          value: "<+pipeline.sequenceId>"
        - name: frontend.image.tag
          value: "<+pipeline.sequenceId>"
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-production
  namespace: argocd
  annotations:
    harness.io/service: myapp
    harness.io/environment: production
spec:
  project: default
  source:
    repoURL: https://github.com/myorg/gitops-config
    targetRevision: HEAD
    path: environments/production/myapp
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
